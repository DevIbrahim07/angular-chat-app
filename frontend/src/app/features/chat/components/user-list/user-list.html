<aside class="flex h-full w-full flex-col bg-[#f8faf9] sm:bg-[#f0f2f5]">
  <div class="border-b border-slate-200 bg-[#f0f2f5] px-4 py-4">
    <div class="mb-3 flex items-center justify-between">
      <div>
        <p class="m-0 text-[11px] font-semibold uppercase tracking-[0.18em] text-slate-500">
          Chats
        </p>
        <h2 class="m-0 text-2xl font-semibold text-slate-900">Messages</h2>
      </div>
      <span
        class="grid h-9 min-w-9 place-items-center rounded-full bg-emerald-50 px-2 text-sm font-semibold text-emerald-700"
      >
        {{ users.length }}
      </span>
    </div>
    <div class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-500 shadow-sm">
      Open any user to continue the conversation.
    </div>
  </div>

  <ul class="m-0 flex-1 list-none overflow-y-auto px-2 py-2 sm:px-3">
    @for (user of users; track user._id) {
      <li
        class="mb-1.5 rounded-lg border border-transparent px-3 py-3 transition-colors"
        [class.bg-white]="!isCurrentUser(user)"
        [class.shadow-sm]="!isCurrentUser(user)"
        [class.hover:bg-emerald-50]="!isCurrentUser(user)"
        [class.hover:border-emerald-100]="!isCurrentUser(user)"
        [class.bg-emerald-50]="isCurrentUser(user)"
        [class.border-emerald-100]="isCurrentUser(user)"
        [class.cursor-pointer]="!isCurrentUser(user)"
        [attr.tabindex]="isCurrentUser(user) ? null : 0"
        [attr.role]="isCurrentUser(user) ? null : 'button'"
        (click)="openConversation(user)"
        (keydown)="onRowKeydown($event, user)"
      >
        <div class="flex items-center gap-3">
          <div class="relative shrink-0">
            <img
              class="h-12 w-12 rounded-full object-cover ring-1 ring-slate-200"
              [src]="avatarUrl(user)"
              alt=""
            />
            <span
              class="absolute bottom-0 right-0 h-3.5 w-3.5 rounded-full border-2 border-white"
              [class.bg-green-500]="user.status === 'online'"
              [class.bg-gray-400]="user.status !== 'online'"
            ></span>
          </div>

          <div class="min-w-0 flex-1">
            <strong class="block truncate text-[15px] font-semibold text-slate-900">
              {{ displayName(user) }}
            </strong>
            <small class="mt-0.5 block truncate text-[13px] text-slate-500">
              {{ lastSeenLabel(user) }}
            </small>
          </div>

          @if (isCurrentUser(user)) {
            <a
              routerLink="/profile"
              class="whitespace-nowrap rounded-full bg-white px-3 py-1.5 text-xs font-semibold text-emerald-700 ring-1 ring-emerald-200 transition hover:bg-emerald-100"
              >Edit</a
            >
          }
        </div>
      </li>
    }
  </ul>
</aside>

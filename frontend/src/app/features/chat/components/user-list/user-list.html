<aside class="flex flex-col h-full bg-white border-r border-gray-300">
  <div class="px-4 py-3 border-b border-gray-300 flex items-center justify-between">
    <h2 class="m-0 font-bold text-gray-900">Users</h2>
    <span class="text-sm text-gray-600">{{ users.length }}</span>
  </div>

  <ul class="flex-1 overflow-y-auto list-none m-0 p-0">
    @for (user of users; track user._id) {
      <li
        class="px-3 py-2.5 border-b border-gray-200 transition-colors hover:bg-gray-50"
        [class.bg-blue-50]="isCurrentUser(user)"
        [class.cursor-pointer]="!isCurrentUser(user)"
        [attr.tabindex]="isCurrentUser(user) ? null : 0"
        [attr.role]="isCurrentUser(user) ? null : 'button'"
        (click)="openConversation(user)"
        (keydown)="onRowKeydown($event, user)"
      >
        <div class="flex items-start gap-3">
          <div class="relative shrink-0">
            <img class="w-10 h-10 rounded-full object-cover" [src]="avatarUrl(user)" alt="" />
            <span
              class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white"
              [class.bg-green-500]="user.status === 'online'"
              [class.bg-gray-400]="user.status !== 'online'"
            ></span>
          </div>

          <div class="flex-1 min-w-0">
            <strong class="block text-gray-900 text-sm truncate">{{ displayName(user) }}</strong>
            <small class="text-xs text-gray-500">{{ lastSeenLabel(user) }}</small>
          </div>

          @if (isCurrentUser(user)) {
            <a
              routerLink="/profile"
              class="text-xs text-blue-500 hover:text-blue-700 whitespace-nowrap"
              >Edit</a
            >
          }
        </div>
      </li>
    }
  </ul>
</aside>

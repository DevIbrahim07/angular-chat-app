<li
  class="flex px-2 sm:px-3"
  [class.justify-end]="message.sender === currentUser"
  [class.justify-start]="message.sender !== currentUser"
  [attr.data-message-id]="message._id"
  [attr.data-is-own]="message.sender === currentUser"
>
  <div
    [class.bg-white]="message.sender !== currentUser"
    [class.border-gray-200]="message.sender !== currentUser"
    [class.bg-emerald-200]="message.sender === currentUser"
    [class.border-emerald-300]="message.sender === currentUser"
    [class.text-slate-900]="message.sender !== currentUser"
    [class.text-slate-900]="message.sender === currentUser"
    class="max-w-[85%] rounded-[18px] border px-3.5 py-2.5 shadow-sm sm:max-w-md"
  >
    <span
      class="mb-1 block text-[11px] font-semibold uppercase tracking-wide"
      [class.text-emerald-900]="message.sender === currentUser"
      [class.text-slate-500]="message.sender !== currentUser"
    >
      {{ message.sender }}
    </span>
    <p class="m-0 whitespace-pre-wrap wrap-break-word text-[15px] leading-6">
      {{ message.message }}
    </p>

    @if (message.sender === currentUser) {
      <div
        class="mt-2 flex items-center justify-end gap-1 text-[11px] text-emerald-900/70"
        [attr.title]="getReadByLabel()"
      >
        @if (getStatusType() === 'sent') {
          <span>&#10003;</span>
        }

        @if (getStatusType() === 'delivered' || getStatusType() === 'read') {
          <span class="-tracking-widest" [class.text-sky-600]="isStatusRead()">
            &#10003;&#10003;
          </span>
        }
      </div>
    }
  </div>
</li>

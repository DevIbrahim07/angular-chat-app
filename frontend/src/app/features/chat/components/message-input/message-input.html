<div class="flex items-end gap-2 sm:gap-3">
  <div
    class="flex flex-1 items-center rounded-full border border-slate-200 bg-white px-4 py-2 shadow-sm focus-within:border-emerald-400 focus-within:ring-2 focus-within:ring-emerald-100"
  >
    <input
      type="text"
      [(ngModel)]="message"
      placeholder="Type a message"
      class="w-full border-0 bg-transparent p-0 text-[15px] text-slate-900 placeholder:text-slate-400 focus:outline-none"
      (keyup.enter)="onSend()"
      (keydown)="onInputKeydown()"
      (blur)="onInputBlur()"
    />
  </div>

  <button
    type="button"
    (click)="onSend()"
    class="grid h-12 w-12 shrink-0 place-items-center rounded-full border-0 bg-emerald-600 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700"
  >
    Send
  </button>
</div>

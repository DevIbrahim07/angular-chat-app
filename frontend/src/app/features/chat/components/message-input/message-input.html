<div class="grid gap-2">
  @if (selectedFile) {
    <div
      class="flex items-center justify-between rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-2 text-sm text-emerald-800 shadow-sm"
    >
      <div class="min-w-0">
        <div class="truncate font-semibold">{{ selectedFile.name }}</div>
        <div class="text-xs text-emerald-700/80">{{ (selectedFile.size / 1024 / 1024).toFixed(2) }} MB</div>
      </div>
      <button
        type="button"
        class="rounded-full border-0 bg-transparent px-2 py-1 text-xs font-semibold text-emerald-700 transition hover:bg-white/60"
        (click)="clearSelectedFile()"
      >
        Remove
      </button>
    </div>
  }

  <div class="flex items-end gap-2 sm:gap-3">
    <label
      class="grid h-12 w-12 shrink-0 cursor-pointer place-items-center rounded-full border border-slate-200 bg-white text-lg text-emerald-700 shadow-sm transition hover:border-emerald-300 hover:bg-emerald-50"
      aria-label="Attach file"
    >
      <input type="file" class="hidden" (change)="onFileSelected($event)" />
      <span>&#128206;</span>
    </label>

    <div
      class="flex flex-1 items-center rounded-full border border-slate-200 bg-white px-4 py-2 shadow-sm focus-within:border-emerald-400 focus-within:ring-2 focus-within:ring-emerald-100"
    >
      <input
        type="text"
        [(ngModel)]="message"
        placeholder="Type a message"
        class="w-full border-0 bg-transparent p-0 text-[15px] text-slate-900 placeholder:text-slate-400 focus:outline-none"
        (keyup.enter)="onSend()"
        (keydown)="onInputKeydown()"
        (blur)="onInputBlur()"
      />
    </div>

    <button
      type="button"
      (click)="onSend()"
      class="grid h-12 w-12 shrink-0 place-items-center rounded-full border-0 bg-emerald-600 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700"
    >
      Send
    </button>
  </div>
</div>
